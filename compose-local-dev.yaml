################################################################################
##  LOCAL (Mounted) build dev stack  ###########################################
################################################################################
## compose-dev.yaml        -> full dev stack running the GHCR-published images.
## compose-local-dev.yaml  -> same stack, but every Blue Core service is BUILT
##                            from your LOCAL repo checkouts and its source is
##                            bind-mounted for live reload (autoreload / dev servers).
##
## It pulls in the whole dev stack (base services + Postgres/Keycloak/Nginx).
## Overrides the Blue Core services with local build + live-mount definitions.
##
## Repo locations come from these env vars:
##
##   LOCAL_BLUECORE_API_DIR        -> bluecore_api repo
##   LOCAL_BLUECORE_WORKFLOWS_DIR  -> bluecore-workflows repo
##   LOCAL_MARVA_DIR               -> marva_editor repo
##   LOCAL_SINOPIA_DIR             -> sinopia_editor repo
##
## *** Define them in ONE place: the top of scripts/start-dev.sh ***, which is
## the intended entrypoint (it also picks this file vs compose-dev.yaml --image).
## To run `docker compose -f compose-local-dev.yaml up --build` directly instead,
## set those four vars yourself (env or a .env file in this directory).
################################################################################


include:
  - compose-dev.yaml

# All Airflow/workflows services share one locally-built image plus the live
# DAG/task code mount. Defined once here, merged into each service below.
x-workflows-local: &workflows-local
  image: bluecore_workflows:local-dev
  # Airflow is optional locally — only started when the "airflow" profile is on
  # (start-dev.sh activates it by default; --no-airflow / subset flags skip it).
  profiles: ["airflow"]
  build:
    context: ${LOCAL_BLUECORE_WORKFLOWS_DIR}
  # Pin Airflow's JWT signing + Flask session secrets for the LOCAL dev stack.
  # Here the apiserver runs multiple gunicorn workers; without a shared secret
  # each worker signs with its own random key -> "JWT token is not valid:
  # Signature verification failed" and a /workflows login loop. Throwaway dev
  # values; only this local stack needs them (tests/prod are unaffected).
  environment:
    AIRFLOW__API_AUTH__JWT_SECRET: bluecore-dev-jwt-secret
    AIRFLOW__API__SECRET_KEY: bluecore-dev-flask-secret
  volumes:
    - ${LOCAL_BLUECORE_WORKFLOWS_DIR}/ils_middleware:/opt/airflow/ils_middleware

services:
  # --- Python: build the local Dockerfile (for deps), mount src, run autoreload ---
  bc_api:
    image: bluecore_api:local-dev
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: ${LOCAL_BLUECORE_API_DIR}
    command:
      - sh
      - -c
      - >
        uv run alembic upgrade head &&
        uv run fastapi dev src/bluecore_api/app/main.py
        --host 0.0.0.0 --port 8100 --root-path /api
    # Browser-facing URLs baked into the HTML view's "Load to Marva/Sinopia"
    # links (and internal-link detection). Without these the API falls back to
    # its dev.bcld.info defaults; point them at the local Nginx routes instead.
    # Override via the matching env vars.
    environment:
      BLUECORE_URL: http://localhost/
      MARVA_BASE_URL: http://localhost/marva/
      SINOPIA_BASE_URL: http://localhost/sinopia/
    volumes:
      - ${LOCAL_BLUECORE_API_DIR}/src:/bluecore_api/src
      - ${LOCAL_BLUECORE_API_DIR}/pyproject.toml:/bluecore_api/pyproject.toml:ro
      - ${LOCAL_BLUECORE_API_DIR}/uv.lock:/bluecore_api/uv.lock:ro

  airflow-apiserver:     { <<: *workflows-local }
  airflow-scheduler:     { <<: *workflows-local }
  airflow-dag-processor: { <<: *workflows-local }
  airflow-worker:        { <<: *workflows-local }
  airflow-triggerer:     { <<: *workflows-local }
  airflow-init:          { <<: *workflows-local }
  airflow-cli:           { <<: *workflows-local }
  flower:                { <<: *workflows-local }

  # Heavy backing services are also profile-gated so a subset run can skip them.
  # redis is only needed by Airflow; the Milvus stack (vector
  # store) is used by Airflow workers and the API's embedding endpoints.
  redis:  { profiles: ["airflow"] }
  etcd:   { profiles: ["milvus"] }
  minio:  { profiles: ["milvus"] }
  milvus: { profiles: ["milvus"] }

  # --- Frontends: run from local source on a node base image with the dev server (HMR) ---
  marva:
    image: node:23
    profiles: ["marva"]
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host --port 8080"
    # The GHCR image bakes these VITE_* vars in at build time; the dev server
    # reads them from the environment instead. Values are browser-facing URLs
    # routed through Nginx (see CLAUDE.md). Override via the matching env vars.
    environment:
      VITE_BLUECORE_API_PATH: http://localhost/api/
      VITE_KEYCLOAK_AUTH_PATH: http://localhost/keycloak/
      VITE_KEYCLOAK_MIDDLEWARE_BASE: http://localhost/marva/util/
    volumes:
      - ${LOCAL_MARVA_DIR}:/app
      - /app/node_modules

  marva-keycloak-middleware:
    image: node:23-alpine
    profiles: ["marva"]
    working_dir: /app
    command: sh -lc "node --watch middleware/marva-keycloak-middleware.js"
    volumes:
      - ${LOCAL_MARVA_DIR}:/app

  # Sinopia HOT-RELOAD dev server, run from your local checkout and served
  # through Nginx at http://localhost/sinopia/ (hot-reload; edits show live).
  #
  # webpack-dev-server serves its bundle at a hardcoded publicPath of
  # /sinopia/dist/ and its HMR websocket at /ws. The dev Nginx config
  # (nginx/local-dev.conf) proxies /sinopia/ WITHOUT stripping the prefix so
  # those paths line up, and forwards /ws for the websocket. --client-web-socket-url
  # pins the HMR client to the Nginx-facing ws URL. Backend calls go straight to
  # Nginx via the absolute URLs below.
  sinopia:
    image: node:24.4.0
    profiles: ["sinopia"]
    working_dir: /app
    command: sh -lc "npm install && (test -f dist/index.html || npm run dev-build) && npm run dev-start -- --host 0.0.0.0 --allowed-hosts all --client-web-socket-url ws://localhost/ws"
    environment:
      SINOPIA_URI: http://localhost/sinopia
      SINOPIA_API_BASE_URL: http://localhost/api
      SEARCH_HOST: http://localhost/api/search/
      KEYCLOAK_URL: http://localhost/keycloak
      SINOPIA_ENV: bluecore
      USE_FIXTURES: "false"
    volumes:
      - ${LOCAL_SINOPIA_DIR}:/app
      - /app/node_modules

  # Dev mode swaps in an Nginx config that serves the Sinopia dev server with
  # HMR (see nginx/local-dev.conf); everything else matches base.conf.
  # depends_on is overridden (not merged) to drop airflow-apiserver, so Nginx
  # can come up without Airflow; local-dev.conf resolves optional upstreams
  # lazily so missing services just 502 instead of blocking startup.
  nginx:
    depends_on: !override
      - bc_api
      - keycloak
    volumes:
      - ./nginx/local-dev.conf:/etc/nginx/conf.d/default.conf
