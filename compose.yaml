include:
  - compose-base.yaml

services:
  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.1.2}
    expose:
      - 8080
      - 8443
    env_file:
      - ./.env
    environment:
      KC_DB_URL: jdbc:postgresql://${DATABASE_HOSTNAME:-postgres}:5432/keycloak
      KC_DB_USERNAME: ${DATABASE_USERNAME:-airflow}
      KC_DB_PASSWORD: ${DATABASE_PASSWORD:-airflow}
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<> /dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: http://localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; if [ $? -eq 0 ]; then echo 'Healthcheck Successful'; exit 0; else echo 'Healthcheck Failed'; exit 1; fi;" ]
      interval: 10s
      timeout: 10s
      retries: 20
    command:
      - start
      - --import-realm
    volumes:
      - /home/bluecore/bluecore-stack/keycloak-export/bluecore-realm.json:/opt/keycloak/data/import/realm.json
      - /home/bluecore/bluecore-stack/keycloak-export:/opt/keycloak/data/export

  nginx:
    image: nginx:1.27.4-alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - keycloak
      - airflow-apiserver
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/base.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/dev.conf:/etc/nginx/conf.d/env/server.conf
      - ./nginx:/var/www/html
    restart: always
