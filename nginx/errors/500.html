<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Blue Core · Something went wrong</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>

<body class="error">
<header class="site-header">
    <div class="container header-inner">
        <div class="brand">
            <img src="/assets/bluecore-small.png" alt="Blue Core Logo" class="logo">
            <span class="sep">|</span>
            <span class="brand-sub">Platform</span>
        </div>
    </div>
</header>

<main class="container">
    <div class="error-card">
        <p class="error-code">500</p>
        <h1>Something went wrong</h1>
        <p>A service is temporarily unavailable or returned an error. Please try again in a few moments.</p>
        <div class="actions">
            <a class="btn btn-primary" href="/">Back to home</a>
            <a class="btn btn-ghost" href="/health-check">Gateway health</a>
        </div>
    </div>
</main>
</body>
</html>
