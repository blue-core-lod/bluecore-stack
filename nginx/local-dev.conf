# Dev-only Nginx config (local build stack). Mirrors nginx/base.conf EXACTLY,
# except the /sinopia/ block proxies to the webpack-dev-server WITHOUT stripping
# the path prefix, plus a /ws block for Sinopia's HMR websocket. This lets the
# hot-reload Sinopia dev server be served at http://localhost/sinopia/ (its
# bundle publicPath is /sinopia/dist/, which only lines up when the prefix is
# preserved). Keep in sync with base.conf if that file changes.

map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
  # env-specific directives go here (listen, ssl_certificate, etc)
  include /etc/nginx/conf.d/env/server.conf;

  location / {
    root /var/www/html;
  }

  location /api/docs { proxy_pass http://bc_api:8100/docs; }
  location /api/openapi.json { proxy_pass http://bc_api:8100/openapi.json; }

  location /api/ {
    proxy_pass http://bc_api:8100/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /instances/ {
    proxy_pass http://bc_api:8100/instances/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location /works/ {
    proxy_pass http://bc_api:8100/works/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location /workflows/ {
    proxy_pass http://airflow-apiserver:8080;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /keycloak/ {
    proxy_pass http://keycloak:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  # --- DEV: serve the Sinopia webpack-dev-server with HMR ---
  # NOTE the missing trailing slash on proxy_pass: the /sinopia/ prefix is
  # passed through unchanged so it matches the dev server's /sinopia/dist/
  # publicPath. (base.conf strips it for the production server.js on :8004.)
  location /sinopia/ {
    proxy_pass http://sinopia:8888;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  # Sinopia HMR websocket (webpack-dev-server default path is /ws).
  location /ws {
    proxy_pass http://sinopia:8888;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  location /marva/ {
    proxy_pass http://marva:8080;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /marva/util/ {
    proxy_pass http://marva-keycloak-middleware:9401/marva/util/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health-check {
    return 200 'ok';
    add_header Content-Type text/plain;
    access_log off;
  }
}
