# Dev-only Nginx config (local build stack). Mirrors nginx/base.conf EXACTLY,
# except the /sinopia/ block proxies to the webpack-dev-server WITHOUT stripping
# the path prefix, plus a /ws block for Sinopia's HMR websocket. This lets the
# hot-reload Sinopia dev server be served at http://localhost/sinopia/ (its
# bundle publicPath is /sinopia/dist/, which only lines up when the prefix is
# preserved). Keep in sync with base.conf if that file changes.

map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
  # env-specific directives go here (listen, ssl_certificate, etc)
  include /etc/nginx/conf.d/env/server.conf;

  # Docker's embedded DNS — lets the variable proxy_pass upstreams resolve at
  # request time instead of at startup (which would fail if a container is
  # absent or not yet running).
  resolver 127.0.0.11 valid=10s ipv6=off;

  location / {
    root /var/www/html;
  }

  # --- bluecore API (always running, but deferred so Nginx need not wait for
  #     it to finish migrating/starting before booting). ---
  location /api/docs {
    set $upstream_api bc_api:8100;
    rewrite ^/api(/.*)$ $1 break;   # /api/docs -> /docs
    proxy_pass http://$upstream_api;
  }

  location /api/ {
    set $upstream_api bc_api:8100;
    rewrite ^/api/(.*)$ /$1 break;  # strip /api/ prefix
    proxy_pass http://$upstream_api;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /instances/ {
    set $upstream_api bc_api:8100;
    proxy_pass http://$upstream_api;   # non-strip: pass /instances/... as-is
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location /works/ {
    set $upstream_api bc_api:8100;
    proxy_pass http://$upstream_api;   # non-strip: pass /works/... as-is
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location /hubs/ {
    proxy_pass http://bc_api:8100/hubs/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location /profiles/ {
    proxy_pass http://bc_api:8100/profiles/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  # OPTIONAL (airflow): 502 while airflow is off.
  location /workflows/ {
    set $upstream_airflow airflow-apiserver:8080;
    proxy_pass http://$upstream_airflow;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /keycloak/ {
    set $upstream_keycloak keycloak:8080;
    proxy_pass http://$upstream_keycloak;   # non-strip: pass /keycloak/... as-is
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  # --- DEV: serve the Sinopia webpack-dev-server with HMR ---
  # NOTE the missing trailing slash / non-strip: the /sinopia/ prefix is passed
  # through unchanged so it matches the dev server's /sinopia/dist/ publicPath.
  # OPTIONAL (sinopia): 502 while sinopia is off.
  location /sinopia/ {
    set $upstream_sinopia sinopia:8888;
    proxy_pass http://$upstream_sinopia;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  # Sinopia HMR websocket (webpack-dev-server default path is /ws).
  location /ws {
    set $upstream_sinopia_ws sinopia:8888;
    proxy_pass http://$upstream_sinopia_ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # OPTIONAL (marva): 502 while marva is off.
  location /marva/ {
    set $upstream_marva marva:8080;
    proxy_pass http://$upstream_marva;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /marva/util/ {
    set $upstream_marva_mw marva-keycloak-middleware:9401;
    proxy_pass http://$upstream_marva_mw;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health-check {
    return 200 'ok';
    add_header Content-Type text/plain;
    access_log off;
  }
}
