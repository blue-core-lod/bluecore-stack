# nginx/conf.d/site.common.conf

map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
  # env-specific directives go here (listen, ssl_certificate, etc)
  include /etc/nginx/conf.d/env/server.conf;

  # Allow large request bodies (e.g. batch upload tarballs). nginx defaults to
  # 1m, which returns 413 before the request ever reaches the API.
  client_max_body_size 100m;

  # Blue Core branded error pages (served for both static 404s and 5xx failures).
  # Mounted at "/var/www/html/errors/"
  error_page 404 /errors/404.html;
  error_page 500 502 503 504 /errors/500.html;

  location ^~ /errors/ {
    root /var/www/html;
    internal;
  }

  location / {
    root /var/www/html;
  }

  location /api/docs { proxy_pass http://bc_api:8100/docs; }
  location /api/openapi.json { proxy_pass http://bc_api:8100/openapi.json; }

  location /api/ {
    proxy_pass http://bc_api:8100/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /instances/ {
    proxy_pass http://bc_api:8100/instances/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location /works/ {
    proxy_pass http://bc_api:8100/works/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location /hubs/ {
    proxy_pass http://bc_api:8100/hubs/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location /profiles/ {
    proxy_pass http://bc_api:8100/profiles/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_protocol_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location /workflows/ {
    proxy_pass http://airflow-apiserver:8080;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # Keycloak auth manager's login_callback sets multiple large cookies (_jwt_token, _id_token)
    # whose combined Set-Cookie headers exceed nginx's default proxy buffers, causing a 502.
    proxy_buffer_size 32k;
    proxy_buffers 4 32k;
    proxy_busy_buffers_size 32k;
  }

  location /keycloak/ {
    proxy_pass http://keycloak:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location /sinopia/ {
    proxy_pass http://sinopia:8004/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  location /marva/ {
    proxy_pass http://marva:8080;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /marva/util/ {
    proxy_pass http://marva-keycloak-middleware:9401/marva/util/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health-check {
    return 200 'ok';
    add_header Content-Type text/plain;
    access_log off;
  }
}
