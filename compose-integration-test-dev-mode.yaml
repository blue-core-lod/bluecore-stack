services:
  # Mount local API source and run FastAPI in autoreload mode for dev-mode reruns.
  bc_api:
    command:
      - uv
      - run
      - fastapi
      - dev
      - src/bluecore_api/app/main.py
      - --host
      - 0.0.0.0
      - --port
      - "8100"
      - --root-path
      - /api
    volumes:
      - ${LOCAL_BLUECORE_API_DIR}/src:/bluecore_api/src
      - ${LOCAL_BLUECORE_API_DIR}/pyproject.toml:/bluecore_api/pyproject.toml:ro
      - ${LOCAL_BLUECORE_API_DIR}/uv.lock:/bluecore_api/uv.lock:ro

  # Mount workflows code into all Airflow runtime services so DAG/task code edits are visible.
  airflow-apiserver:
    volumes:
      - ${LOCAL_BLUECORE_WORKFLOWS_DIR}/ils_middleware:/opt/airflow/ils_middleware

  airflow-scheduler:
    volumes:
      - ${LOCAL_BLUECORE_WORKFLOWS_DIR}/ils_middleware:/opt/airflow/ils_middleware

  airflow-dag-processor:
    volumes:
      - ${LOCAL_BLUECORE_WORKFLOWS_DIR}/ils_middleware:/opt/airflow/ils_middleware

  airflow-worker:
    volumes:
      - ${LOCAL_BLUECORE_WORKFLOWS_DIR}/ils_middleware:/opt/airflow/ils_middleware

  airflow-init:
    volumes:
      - ${LOCAL_BLUECORE_WORKFLOWS_DIR}/ils_middleware:/opt/airflow/ils_middleware

  airflow-cli:
    volumes:
      - ${LOCAL_BLUECORE_WORKFLOWS_DIR}/ils_middleware:/opt/airflow/ils_middleware

  airflow-triggerer:
    volumes:
      - ${LOCAL_BLUECORE_WORKFLOWS_DIR}/ils_middleware:/opt/airflow/ils_middleware

  # Run middleware from local marva_editor source with file watch for rapid iteration.
  marva-keycloak-middleware:
    image: ${MARVA_KEYCLOAK_MIDDLEWARE_IMAGE:-node:23-alpine}
    working_dir: /app
    command: sh -lc "node --watch middleware/marva-keycloak-middleware.js"
    volumes:
      - ${LOCAL_MARVA_DIR}:/app

  # Run Marva frontend from local marva_editor source via Vite dev server.
  marva:
    image: ${MARVA_IMAGE:-node:23}
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host --port 8080"
    volumes:
      - ${LOCAL_MARVA_DIR}:/app
      - /app/node_modules

  # Run Sinopia from local sinopia_editor source via the webpack dev server so
  # code edits are picked up on rerun. The env vars bake LOCAL URLs into the
  # bundle, so the post-login SSO redirect stays on the local stack (which lets
  # the authenticated login/logout UI test run instead of skipping). Mirrors the
  # sinopia service in compose-local-dev.yaml (dev server on :8888 with HMR).
  sinopia:
    image: node:24.4.0
    working_dir: /app
    command: sh -lc "npm install && (test -f dist/index.html || npm run dev-build) && npm run dev-start -- --host 0.0.0.0 --allowed-hosts all --client-web-socket-url ws://localhost/ws"
    environment:
      SINOPIA_URI: http://localhost/sinopia
      SINOPIA_API_BASE_URL: http://localhost/api
      SEARCH_HOST: http://localhost/api/search/
      KEYCLOAK_URL: http://localhost/keycloak
      SINOPIA_ENV: bluecore
      USE_FIXTURES: "false"
    volumes:
      - ${LOCAL_SINOPIA_DIR}:/app
      - /app/node_modules

  # base.conf strips the /sinopia/ prefix and targets the published server on
  # :8004, which does not match the dev server's /sinopia/dist/ publicPath. Swap
  # in local-dev.conf (non-stripping /sinopia/ plus the /ws HMR route), the same
  # config ./scripts/dev/run uses for local Sinopia.
  nginx:
    volumes:
      - ./nginx/local-dev.conf:/etc/nginx/conf.d/default.conf