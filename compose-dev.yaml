include:
  - compose-base.yaml

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_MULTIPLE_DB: airflow, keycloak, bluecore
    ports:
      - ${POSTGRES_HOST_PORT:-5432}:5432
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./scripts/init-multi-postgres-dbs.sh:/docker-entrypoint-initdb.d/init-multi-postgres-dbs.sh
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.1.2}
    expose:
      - 8080
      - 8443
    env_file:
      - ./.env
    environment:
      # Keycloak's DB connection is derived from the shared DATABASE_* vars
      KC_DB_URL: jdbc:postgresql://${DATABASE_HOSTNAME:-postgres}:${DATABASE_PORT:-5432}/keycloak
      KC_DB_USERNAME: ${DATABASE_USERNAME:-airflow}
      KC_DB_PASSWORD: ${DATABASE_PASSWORD:-airflow}
    command:
      - start-dev
      - --import-realm
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<> /dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: http://localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; if [ $? -eq 0 ]; then echo 'Healthcheck Successful'; exit 0; else echo 'Healthcheck Failed'; exit 1; fi;" ]
      interval: 10s
      timeout: 10s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # The committed development realm lives in its own folder. Mount the whole
      # dir (not a single file) KEYCLOAK_REALM_DIR defaults to development here.
      - ${KEYCLOAK_REALM_DIR:-./keycloak-export/development}:/opt/keycloak/data/import
      - ${KEYCLOAK_REALM_DIR:-./keycloak-export/development}:/opt/keycloak/data/export

  nginx:
    image: nginx:1.27.4-alpine
    ports:
      - "80:80"
    depends_on:
      - bc_api
      - keycloak
      - airflow-apiserver
    volumes:
      - ./nginx/base.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/local.conf:/etc/nginx/conf.d/env/server.conf
      - ./nginx:/var/www/html
    restart: always

volumes:
  postgres-db-volume:
