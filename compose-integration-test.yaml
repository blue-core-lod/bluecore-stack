services:
  postgres:
    environment:
      POSTGRES_MULTIPLE_DB: airflow,keycloak,bluecore,${INTEGRATION_DB_NAME:-bluecore_integration_test}

  # Keep local integration runs lightweight;
  # for API->Workflows->Keycloak integration checks.
  etcd:
    profiles: ["integration-full"]

  minio:
    profiles: ["integration-full"]

  milvus:
    profiles: ["integration-full"]

  sinopia:
    profiles: ["integration-full"]

  marva:
    profiles: ["integration-full"]

  marva-keycloak-middleware:
    profiles: ["integration-full"]
    environment:
      # Overrides MARVA_UTIL_PATH from .env instead of proxying to a live external upstream (e.g. bibframe.org).
      MARVA_UTIL_PATH: ""

  airflow-triggerer:
    profiles: ["disabled"]

  nginx:
    profiles: ["integration-full"]

  # Ensure Keycloak starts after Postgres is available.
  keycloak:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Cap JVM heap for local integration to avoid host OOM kills.
      JAVA_OPTS_KC_HEAP: "-XX:MaxRAMPercentage=30 -XX:MinRAMPercentage=10"
      # Pin the bootstrap admin to a fixed value (overrides the .env value injected
      # via env_file) so it matches the kcadm login in integration-tests.sh
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-gracious-professed}
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<> /dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: http://localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; if [ $? -eq 0 ]; then echo 'Healthcheck Successful'; exit 0; else echo 'Healthcheck Failed'; exit 1; fi;" ]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 180s
    restart: unless-stopped
    ports:
      - "${INTEGRATION_KEYCLOAK_PORT:-18080}:8080"

  # Ensure API bootstraps Keycloak middleware at startup.
  bc_api:
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://airflow:airflow@postgres:5432/${INTEGRATION_DB_NAME:-bluecore_integration_test}
      UV_CACHE_DIR: /tmp/uv-cache
      # bc_api authenticates to Airflow's /auth/token with these to trigger DAGs.
      # Override the .env value (injected via env_file) so it matches the FAB user
      # airflow-init creates. Interpolated from the value the test runner exports.
      AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_WWW_USER_USERNAME:-developer}
      AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_WWW_USER_PASSWORD:-123456}
    ports:
      - "${INTEGRATION_API_PORT:-18100}:8100"

  airflow-apiserver:
    environment:
      AIRFLOW_CONN_BLUECORE_DB: postgresql+psycopg2://airflow:airflow@postgres:5432/${INTEGRATION_DB_NAME:-bluecore_integration_test}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /tmp/airflow-logs
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${INTEGRATION_AIRFLOW_INTERNAL_API_SECRET_KEY:-integration-internal-api-secret}
      AIRFLOW__API_AUTH__JWT_SECRET: ${INTEGRATION_AIRFLOW_API_AUTH_JWT_SECRET:-integration-api-auth-jwt-secret}
      AIRFLOW__API__WORKERS: "1"
      AIRFLOW_CONFIG: /tmp/airflow.cfg
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    ports:
      - "${INTEGRATION_AIRFLOW_PORT:-18090}:8080"

  airflow-scheduler:
    environment:
      AIRFLOW_CONN_BLUECORE_DB: postgresql+psycopg2://airflow:airflow@postgres:5432/${INTEGRATION_DB_NAME:-bluecore_integration_test}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /tmp/airflow-logs
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${INTEGRATION_AIRFLOW_INTERNAL_API_SECRET_KEY:-integration-internal-api-secret}
      AIRFLOW__API_AUTH__JWT_SECRET: ${INTEGRATION_AIRFLOW_API_AUTH_JWT_SECRET:-integration-api-auth-jwt-secret}
      AIRFLOW__SCHEDULER__PARSING_PROCESSES: "1"
      AIRFLOW_CONFIG: /tmp/airflow.cfg
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

  airflow-dag-processor:
    environment:
      AIRFLOW_CONN_BLUECORE_DB: postgresql+psycopg2://airflow:airflow@postgres:5432/${INTEGRATION_DB_NAME:-bluecore_integration_test}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /tmp/airflow-logs
      AIRFLOW__LOGGING__DAG_PROCESSOR_CHILD_PROCESS_LOG_DIRECTORY: /tmp/airflow-logs/dag_processor
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${INTEGRATION_AIRFLOW_INTERNAL_API_SECRET_KEY:-integration-internal-api-secret}
      AIRFLOW__API_AUTH__JWT_SECRET: ${INTEGRATION_AIRFLOW_API_AUTH_JWT_SECRET:-integration-api-auth-jwt-secret}
      AIRFLOW_CONFIG: /tmp/airflow.cfg
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

  airflow-worker:
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      airflow-apiserver:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW_CONN_BLUECORE_DB: postgresql+psycopg2://airflow:airflow@postgres:5432/${INTEGRATION_DB_NAME:-bluecore_integration_test}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /tmp/airflow-logs
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${INTEGRATION_AIRFLOW_INTERNAL_API_SECRET_KEY:-integration-internal-api-secret}
      AIRFLOW__API_AUTH__JWT_SECRET: ${INTEGRATION_AIRFLOW_API_AUTH_JWT_SECRET:-integration-api-auth-jwt-secret}
      AIRFLOW__CELERY__WORKER_CONCURRENCY: "2"
      AIRFLOW__CELERY__WORKER_AUTOSCALE: "2,1"
      AIRFLOW_CONFIG: /tmp/airflow.cfg
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

  airflow-init:
    environment:
      AIRFLOW_CONN_BLUECORE_DB: postgresql+psycopg2://airflow:airflow@postgres:5432/${INTEGRATION_DB_NAME:-bluecore_integration_test}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /tmp/airflow-logs
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${INTEGRATION_AIRFLOW_INTERNAL_API_SECRET_KEY:-integration-internal-api-secret}
      AIRFLOW__API_AUTH__JWT_SECRET: ${INTEGRATION_AIRFLOW_API_AUTH_JWT_SECRET:-integration-api-auth-jwt-secret}
      AIRFLOW_CONFIG: /tmp/airflow.cfg
